<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МЕТР</title>

    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body>
    <section class="information">
      <header class="header">
        <img class="header--logo" src="/assets/gallery/icon/logo.png" />
        <nav class="header--navigation">
          <ul class="header--navigation--list">
            <li><a>О фестивале</a></li>
            <li><a>Активности</a></li>
            <li><a>Впечатления</a></li>
            <li><a>Стена метра</a></li>
            <li><a>Контакты</a></li>
          </ul>
        </nav>
        <button class="btn-header">
          <span>ЗАРЕГИСТРИРОВАТЬСЯ</span>
        </button>

        <div class="header--groupIcon">
          <img src="/assets/gallery/icon/user-add.svg" />
          <img src="/assets/gallery/icon/burger.svg" />
        </div>
      </header>

      <h1 class="information__heading">АКТИВНОСТИ ФЕСТИВАЛЯ</h1>

      <p class="information--text">
        Четыре способа зафиксировать свой прогресс <br />
        Выбери тот, который тебе ближе
      </p>

      <div class="information--activitesGroup">
        <div>
          <img src="/assets/gallery/icon/man-walking.svg" />
          <p>ШАГ</p>
        </div>

        <div>
          <img src="/assets/gallery/icon/running.svg" />
          <p>БЕГ</p>
        </div>

        <div>
          <img src="/assets/gallery/icon/jumping.svg" />
          <p>ПРЫЖОК</p>
        </div>

        <div>
          <img src="/assets/gallery/icon/person.svg" />
          <p>БРОСОК</p>
        </div>
      </div>

      <div class="information--btnGroup">
        <button class="promoblock-btn">
          <span>ПРИНЯТЬ УЧАСТИЕ</span>
        </button>
        <button class="promoblock-btn">
          <span>СТАТЬ ВОЛОНТЁРОМ</span>
        </button>
      </div>
    </section>
  </body>
</html>
