<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>МЕТР</title>

    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body>
    <section class="promoblock">
      <header class="header">
        <img class="header--logo" src="/assets/gallery/icon/logo.png" />
        <nav class="header--navigation">
          <ul class="header--navigation--list">
            <li>О фестивале</li>
            <li>Активности</li>
            <li>Впечатления</li>
            <li>Стена метра</li>
            <li>Контакты</li>
          </ul>
        </nav>
        <button class="btn-header">
          <span>ЗАРЕГИСТРИРОВАТЬСЯ</span>
        </button>
      </header>

      <h1 class="promoblock__heading promoblock__heading--first">
        НЕ БЫСТРЕЕ ВСЕХ,
      </h1>
      <h1 class="promoblock__heading promoblock__heading--second">
        А ДАЛЬШЕ СЕБЯ ВЧЕРАШНЕГО
      </h1>
      <p class="promoblock--text">
        Метр — фестиваль, где твой личный прогресс важнее победы
      </p>
      <div class="promoblock--btnGroup">
        <button class="btn-primary-yellow">
          <span>ПРИНЯТЬ УЧАСТИЕ</span>
        </button>
        <button class="btn-primary-yellow">
          <span>СТАТЬ ВОЛОНТЁРОМ</span>
        </button>
      </div>

      <div class="promoblock--advantagesGroup">
        <div>
          <h2>1 247</h2>
          <p>человек приняли участие</p>
        </div>

        <div>
          <h2>25</h2>
          <p>в 25 городах проведён фестиваль</p>
        </div>

        <div>
          <h2>1556</h2>
          <p>значков выдано</p>
        </div>
      </div>
    </section>
  </body>
</html>
